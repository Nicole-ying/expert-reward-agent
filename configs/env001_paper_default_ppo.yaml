extends: env001_deepseek_rag.yaml

iteration:
  experiment_prefix: paper_lander_default_ppo_v1
  total_rounds: 10

ablation:
  disable_expert_rag: false
  disable_memory: false

training:
  # ── SB3 PPO defaults (overriding tuned LunarLander params) ──
  n_envs: 1
  n_steps: 2048
  batch_size: 64
  gae_lambda: 0.95
  gamma: 0.99
  n_epochs: 10
  ent_coef: 0.0
  learning_rate: 0.0003
  clip_range: 0.2
  vf_coef: 0.5
  max_grad_norm: 0.5
  device: cpu
  policy_kwargs:
    ortho_init: true
    activation_fn: Tanh
    net_arch:
      pi: [64, 64]
      vf: [64, 64]
