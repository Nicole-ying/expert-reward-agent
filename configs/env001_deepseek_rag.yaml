experiment:
  env_id: Env_001
  run_root: runs/env_001
  run_name: null
  seed: 0

llm:
  provider: deepseek
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  model_env: deepseek-v4-pro
  model_reward: deepseek-v4-pro
  temperature_environment_analyzer: 0.0
  temperature_reward_generator: 0.15
  max_tokens_env: 4096
  max_tokens_reward: 8192

inputs:
  task_spec_path: envs/env_001/task_spec_anonymized.yaml
  masked_step_path: envs/env_001/masked_step_source.py

prompts:
  environment_analyzer: prompts/01_environment_analyzer_prompt.md
  reward_generator: prompts/02_reward_generator_prompt.md
  reward_revision: prompts/03_reward_revision_prompt.md

rag:
  route_catalog_path: knowledge_base/stage_generation/route_catalog_03.json
  skeleton_catalog_path: knowledge_base/stage_generation/skeleton_catalog_02.json
  generation_chunks_path: knowledge_base/stage_generation/generation_chunks_02_03_exact.jsonl
  generation_table_chunks_path: knowledge_base/stage_generation/table_chunks_02_03.jsonl
  reward_misalignment_cards_path: knowledge_base/iteration/reward_misalignment_cards.md

context:
  include_masked_step_in_reward_generator: false
  max_expert_context_chars: 6500

reward_generation:
  function_signature: "def compute_reward(obs, action, next_obs, original_reward, info, training_progress=0.0):"
  forbidden_info_fields_for_reward:
    - original_reward
    - official_reward
    - fitness_score
    - individual_reward
    - success
    - failure
    - termination_reason

ablation:
  disable_expert_rag: true

multi_seed:
  enabled: true
  start_seed: 0
  num_seeds: 5

iteration:
  total_rounds: 10
  experiment_prefix: lander_v2_20260704
  experiment_root: runs/env_001/experiments
  memory_path: runs/env_001/memory/reward_memory.md
  reset_memory_at_start: true
  cards_top_k: 4
  stop_on_invalid_reward: true
  use_mock_llm: false

  # Env_001 is considered solved when external evaluation mean score reaches 200.
  target_score: 200.0

  # Best-retention and stopping policy.
  save_best_artifacts: true
  stop_after_solved_drop: true
  stop_when_solved_and_identical: true
  no_improvement_patience_after_solved: 2
  no_improvement_patience_unsolved: 3
  min_meaningful_improvement: 5.0

  # No-op protection. This is a safety guard, not the main search strategy.
  retry_identical_when_unsolved: true
  max_identical_revision_retries: 2

  # Single-agent reflection mode (replaces run_04+05)
  use_reflection_agent: true

training:
  runner_env_id: LunarLander-v3
  normalize_obs: false
  normalize_reward: false
  policy: MlpPolicy
  n_envs: 4
  total_timesteps: 1000000
  eval_episodes: 20
  eval_seed_offset: 10000
  n_steps: 1024
  batch_size: 64
  gae_lambda: 0.98
  gamma: 0.999
  n_epochs: 4
  ent_coef: 0.01
  device: auto
  seed: 0
  max_training_steps_for_progress: 1000000
  save_dir: runs/env_001/training_runs
  run_name: ppo_reward_v1_001
  tensorboard_log: runs/env_001/tensorboard
