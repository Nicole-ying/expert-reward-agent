# Test: deepseek-chat with full pipeline (env card + expert context)
# BipedalWalker-v3, 1 seed, 1 iteration, n_envs=1, batch=64
experiment:
  env_id: Env_002
  run_root: runs/env_002

llm:
  provider: deepseek
  base_url: https://api.deepseek.com
  api_key_env: DEEPSEEK_API_KEY
  model_env: deepseek-chat
  model_reward: deepseek-chat
  temperature_environment_analyzer: 0.0
  temperature_reward_generator: 0.15
  max_tokens_env: 4096
  max_tokens_reward: 8192

inputs:
  task_spec_path: envs/env_002/task_spec_anonymized.yaml
  masked_step_path: envs/env_002/masked_step_source.py

prompts:
  environment_analyzer: prompts/01_environment_analyzer_prompt.md
  reward_generator: prompts/02_reward_generator_prompt.md
  reward_revision: prompts/03_reward_revision_prompt.md

rag:
  route_catalog_path: knowledge_base/stage_generation/route_catalog_03.json
  skeleton_catalog_path: knowledge_base/stage_generation/skeleton_catalog_02.json
  generation_chunks_path: knowledge_base/stage_generation/generation_chunks_02_03_exact.jsonl
  generation_table_chunks_path: knowledge_base/stage_generation/table_chunks_02_03.jsonl
  reward_misalignment_cards_path: knowledge_base/iteration/reward_misalignment_cards.md

context:
  include_masked_step_in_reward_generator: false
  max_expert_context_chars: 6500

reward_generation:
  function_signature: "def compute_reward(obs, action, next_obs, original_reward, info, training_progress=0.0):"
  forbidden_info_fields_for_reward:
    - original_reward
    - official_reward
    - reward_forward
    - reward_ctrl
    - reward_contact
    - reward_survive
    - x_position
    - y_position
    - distance_from_origin

multi_seed:
  enabled: false

iteration:
  total_rounds: 1
  experiment_prefix: test_chat_with_env_card
  experiment_root: runs/env_002
  memory_path: runs/env_002/test_chat_with_env_card/memory/reward_memory.md
  reset_memory_at_start: true
  cards_top_k: 4
  stop_on_invalid_reward: true
  use_mock_llm: false
  target_score: 300.0
  save_best_artifacts: true
  stop_after_solved_drop: false
  stop_when_solved_and_identical: false
  no_improvement_patience_after_solved: 2
  no_improvement_patience_unsolved: 3
  min_meaningful_improvement: 5.0
  retry_identical_when_unsolved: true
  max_identical_revision_retries: 2
  use_reflection_agent: false

training:
  runner_env_id: BipedalWalker-v3
  normalize_obs: true
  normalize_reward: false
  clip_obs: 10.0
  policy: MlpPolicy
  n_envs: 8
  total_timesteps: 1000000
  eval_episodes: 20
  eval_seed_offset: 10000
  n_steps: 2048
  batch_size: 128
  gae_lambda: 0.95
  gamma: 0.99
  n_epochs: 10
  ent_coef: 0.0
  learning_rate: 0.0003
  clip_range: 0.2
  max_grad_norm: 0.5
  vf_coef: 0.5
  policy_kwargs:
    ortho_init: true
    activation_fn: Tanh
    net_arch:
      pi: [64, 64]
      vf: [64, 64]
  device: cpu
  seed: 0
  save_dir: runs/env_002/test_chat_with_env_card
  run_name: test_chat_with_env_card
  tensorboard_log: runs/env_002/tensorboard/test_chat
